<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Audio Podcast</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            /* FONDO DE LA PÁGINA */
            background-image:url("imágenes/Podcast.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .contenedor{

            background:rgba(255,255,255,0.92);
            width:420px;
            padding:40px;
            border-radius:20px;
            text-align:center;

            box-shadow:0 4px 15px rgba(0,0,0,0.4);
        }

        h1{
            color:#0d47a1;
            margin-bottom:20px;
        }

        p{
            color:#555;
            margin-bottom:20px;
            line-height:1.5;
        }

        audio{
            width:100%;
        }

        .boton{

            display:inline-block;

            margin-top:25px;

            background:#1565c0;
            color:white;

            padding:10px 20px;

            text-decoration:none;

            border-radius:10px;

            transition:0.3s;
        }

        .boton:hover{
            background:#0d47a1;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h1>Audio Podcast</h1>

        <p>
            Escucha el podcast del proyecto MOS.
        </p>

        <audio controls autoplay>
            <source src="Audio/Pódcast definitivo (1).mp3" type="audio/mpeg">
        </audio>

        <a href="index.html" class="boton">
            Volver al Inicio
        </a>

    </div>

</body>

</html>
